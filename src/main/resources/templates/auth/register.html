<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sign Up | HyperLink</title>
    <link rel="stylesheet" th:href="@{/css/register.css}">
</head>

<body>

<section class="signup-section">

    <form th:action="@{/register}" th:object="${user}" method="post" class="signup-form">

        <h2><a th:href="@{/}">HyperLink</a></h2>

        <h1>Create your account</h1>

        <p>Get started with your personal link hub</p>

        <label>Username:</label>
        <input type="text" th:field="*{username}" placeholder="Username" required />

        <label>Password:</label>
        <input type="password" th:field="*{password}" placeholder="Password" required />

        <label>Display Name:</label>
        <input type="text" th:field="*{name}" placeholder="Display Name" />

        <label>Age:</label>
        <input type="text" th:field="*{age}" placeholder="Age" />

        <label>Pronouns:</label>
        <input type="text" th:field="*{pronouns}" placeholder="Pronouns" />

        <label>Bio:</label>
        <textarea th:field="*{bio}" placeholder="Tell people about yourself"></textarea>

        <label>Profile Picture URL:</label>
        <input type="text" th:field="*{profilePicture}" placeholder="Profile Image URL" />

        <label>Theme:</label>
        <select th:field="*{theme}">
            <option th:each="themeOption : ${themes}"
                    th:value="${themeOption}"
                    th:text="${themeOption}">
            </option>
        </select>

        <h3>Add Your Links</h3>
        <p>Fill out the links you want to share.</p>

        <div id="links-container">

            <div th:each="link, stat : *{socialLinks}" class="link-entry">

                <h4>Link <span class="link-number" th:text="${stat.count}">1</span></h4>

                <label>Title:</label>
                <input type="text"
                       th:field="*{socialLinks[__${stat.index}__].title}"
                       placeholder="e.g., My Portfolio" />

                <label>URL:</label>
                <input type="url"
                       th:field="*{socialLinks[__${stat.index}__].url}"
                       placeholder="https://..." />

            </div>

        </div>

        <button type="button" id="add-link-btn">Add Another Link</button>

        <button type="submit" id="signup-btn">Create Account</button>

        <a th:href="@{/login}">Already have an account? Log in</a>

    </form>

</section>

<footer>
    <p>&copy; 2026 HyperLink. All rights reserved.</p>
</footer>


<script>
    document.getElementById('add-link-btn').addEventListener('click', function() {

        const container = document.getElementById('links-container');

        const linkEntries = container.getElementsByClassName('link-entry');
        const nextIndex = linkEntries.length;
        const displayCount = nextIndex + 1;

        const newLinkDiv = document.createElement('div');
        newLinkDiv.className = 'link-entry';

        newLinkDiv.innerHTML = `
                <h4>Link <span class="link-number">${displayCount}</span></h4>

                <label>Title:</label>
                <input type="text" name="socialLinks[${nextIndex}].title" placeholder="e.g., Twitter" />

                <label>URL:</label>
                <input type="url" name="socialLinks[${nextIndex}].url" placeholder="https://..." />
            `;

        container.appendChild(newLinkDiv);
    });
</script>

<footer>
    <p>&copy; 2026 HyperLink. All rights reserved.</p>
</footer>
</body>
</html>
