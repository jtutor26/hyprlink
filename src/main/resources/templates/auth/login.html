<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login | HyperLink</title>
    <link rel="stylesheet" th:href="@{/css/login.css}">
</head>

<body>
<nav class="nav">
    <div class="nav-left">
        <a th:href="@{/}" id="link-garden">HyperLink</a>
    </div>
    <div class="nav-center">
        <a th:href="@{/}">Templates</a>
    </div>
    <div class="nav-right">
        <a th:href="@{/register}" id="sign-up-btn">Sign Up</a>
    </div>
</nav>
<main class="auth-page">
<section class="login-section">

    <form th:action="@{/login}" method="post" class="login-form">
        <h2><a th:href="@{/}">HyperLink</a></h2>
        <h1>Welcome Back</h1>

        <p>Log in to your account</p>

        <div th:if="${param.error}">
            <p style="color: red;">Invalid username or password.</p>
        </div>
        <div th:if="${param.logout}">
            <p style="color: green;">You have been logged out.</p>
        </div>
        <div th:if="${param.success}">
            <p style="color: green;">Registration successful! Please log in.</p>
        </div>

        <label>
            <input type="text" name="username" placeholder="Username" required /><br/>
        </label>

        <label>
            <input type="password" name="password" placeholder="Password" required /><br/>
        </label>

        <button type="submit" id="login-btn">Log In</button>
        <a th:href="@{/register}">Don't have an account? Sign up</a>

    </form>

</section>

<footer>
    <p>&copy; 2026 HyperLink. All rights reserved.</p>
</footer>

</main>
</body>
</html>
