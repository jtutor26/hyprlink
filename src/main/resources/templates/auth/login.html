<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login | HyperLink</title>
    <link rel="stylesheet" th:href="@{/css/login.css}">
</head>

<body>
<nav class="nav">
    <div class="nav-left">
        <svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" aria-hidden="true" role="img" width="65" height="65" viewBox="0 0 56 56" style="color: rgb(28, 32, 51);"><path fill="currentColor" d="M28 51.906c13.055 0 23.906-10.828 23.906-23.906c0-13.055-10.875-23.906-23.93-23.906C14.899 4.094 4.095 14.945 4.095 28c0 13.078 10.828 23.906 23.906 23.906m0-3.984C16.937 47.922 8.1 39.062 8.1 28c0-11.04 8.813-19.922 19.876-19.922c11.039 0 19.921 8.883 19.945 19.922c.023 11.063-8.883 19.922-19.922 19.922m10.078-30.469c-2.789-2.765-6.258-2.531-9.492.703l-3.328 3.328c-3.305 3.282-3.586 6.774-.774 9.563c.774.797 1.64 1.312 2.274 1.43c.633-.446 1.383-1.266 1.71-2.016q-1.51-.246-2.32-1.055c-1.734-1.758-1.476-4.078.82-6.328l3.212-3.234c2.18-2.18 4.5-2.438 6.234-.703c1.758 1.734 1.547 4.054-.68 6.234l-2.32 2.297c.352.844.375 2.133.023 3.234l3.985-3.937c3.21-3.258 3.469-6.703.656-9.516m-21 21.047c2.79 2.766 6.258 2.531 9.492-.703l3.328-3.328c3.305-3.282 3.586-6.774.774-9.563c-.774-.797-1.64-1.312-2.274-1.43c-.633.446-1.383 1.266-1.71 2.016q1.51.246 2.32 1.055c1.734 1.758 1.476 4.055-.82 6.305l-3.211 3.257c-2.18 2.18-4.5 2.438-6.235.703c-1.758-1.734-1.547-4.054.68-6.234l2.32-2.297c-.352-.867-.375-2.133-.023-3.234l-3.985 3.937c-3.21 3.258-3.469 6.703-.656 9.516"></path></svg>
        <a th:href="@{/}" id="link-garden">HyperLink</a>
    </div>
    <div class="nav-center">
        <a th:href="@{/templates}">Templates</a>
    </div>
    <div class="nav-right">
        <a th:href="@{/register}" id="sign-up-btn">Sign Up</a>
    </div>
</nav>
<main class="auth-page">
<section class="login-section">

    <form th:action="@{/login}" method="post" class="login-form">
        <h2><a th:href="@{/}">HyperLink</a></h2>
        <h1>Welcome Back</h1>

        <p>Log in to your account</p>

        <div th:if="${param.error}">
            <p style="color: red;">Invalid username or password.</p>
        </div>
        <div th:if="${param.logout}">
            <p style="color: green;">You have been logged out.</p>
        </div>
        <div th:if="${param.success}">
            <p style="color: green;">Registration successful! Please log in.</p>
        </div>

        <label>
            <input type="text" name="username" placeholder="Username" required /><br/>
        </label>

        <label>
            <input type="password" name="password" placeholder="Password" required /><br/>
        </label>

        <button type="submit" id="login-btn">Log In</button>
        <a th:href="@{/register}">Don't have an account? Sign up</a>

    </form>

</section>

<footer>
    <p>&copy; 2026 HyperLink. All rights reserved.</p>
</footer>

</main>
<div id="login-overlay" class="hidden">
    <div class="overlay-content">
        <div class="spinner-container">
            <div id="loading-spinner" class="spinner"></div>
            <div id="success-checkmark" class="checkmark hidden">✓</div>
        </div>
    </div>
</div>
<script>
    // Wait for the login form to be submitted
    document.querySelector("form").addEventListener("submit", function(event) {
        // Prevent the form from submitting immediately
        event.preventDefault();

        const form = this;
        const overlay = document.getElementById("login-overlay");
        const spinner = document.getElementById("loading-spinner");
        const checkmark = document.getElementById("success-checkmark");

        // 1. Show the dark overlay and white box
        overlay.classList.remove("hidden");

        // 2. Wait 1.2 seconds (simulating "loading"), then show the checkmark
        setTimeout(() => {
            spinner.classList.add("hidden");
            checkmark.classList.remove("hidden");

            // 3. Wait half a second for the user to see the checkmark, then submit!
            setTimeout(() => {
                form.submit();
            }, 600);

        }, 1200);
    });
</script>
</body>
</html>
