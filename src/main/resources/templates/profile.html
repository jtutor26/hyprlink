<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <link rel="stylesheet" th:href="@{/css/{themeName}.css(themeName=${user.theme != null ? user.theme : 'default'})}">
    <title th:text="${user.name} + ' | HyperLink'">HyperLink Profile</title>
</head>

<body th:class="'theme-' + ${user.theme}"
      th:with="bgUrl=${user.backgroundImage != null and !user.backgroundImage.isEmpty() ?
                        (#strings.startsWith(user.backgroundImage, '/images/') ?
                         user.backgroundImage :
                         '/images/background-templates/' + user.backgroundImage) : null}"
      th:style="${bgUrl != null ? 'background: url(' + bgUrl + ') center/cover no-repeat fixed;' : ''}">

<div class="profile-container"
     th:classappend="${' link-style-' + (user.linkStyle != null ? user.linkStyle : 'pill') + ' text-align-' + (user.textAlign != null ? user.textAlign : 'center') + ' button-color-' + (user.buttonColor != null ? user.buttonColor : 'blue') + ' font-family-' + (user.fontFamily != null ? user.fontFamily.toLowerCase() : 'system')}">

    <img class="profile-pic animate-pop-in" th:src="${user.profilePicture}" alt="Profile Picture">

    <h1 class="name animate-fade-up delay-1" th:text="${user.name}">Default Name</h1>

    <p class="demographics animate-fade-up delay-2">
        <span th:text="${user.age}">Age</span> • <span th:text="${user.pronouns}">Pronouns</span>
    </p>

    <p class="bio animate-fade-up delay-3" th:text="${user.bio}">Default bio text goes here.</p>

    <ul class="link-list">
        <li th:each="link, iterStat : ${user.socialLinks}"
            class="animate-slide-in"
            th:style="|animation-delay: ${0.4 + (iterStat.index * 0.15)}s;|">

            <a class="link-button" th:href="${link.url}" target="_blank" th:text="${link.title}">Link Title</a>
        </li>
    </ul>
</div>

</body>
</html>
