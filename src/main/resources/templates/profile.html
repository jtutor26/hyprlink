<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <link rel="stylesheet" th:href="@{/css/{themeName}.css(themeName=${user.theme})}">
    <title th:text="${user.name} + ' | Link Garden'">Link Garden Profile</title>
</head>

<body th:class="'theme-' + ${user.theme}">
<nav class="nav">
    <div class="nav-left">
        <svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" aria-hidden="true" role="img" width="65" height="65" viewBox="0 0 56 56" style="color: rgb(28, 32, 51);"><path fill="currentColor" d="M28 51.906c13.055 0 23.906-10.828 23.906-23.906c0-13.055-10.875-23.906-23.93-23.906C14.899 4.094 4.095 14.945 4.095 28c0 13.078 10.828 23.906 23.906 23.906m0-3.984C16.937 47.922 8.1 39.062 8.1 28c0-11.04 8.813-19.922 19.876-19.922c11.039 0 19.921 8.883 19.945 19.922c.023 11.063-8.883 19.922-19.922 19.922m10.078-30.469c-2.789-2.765-6.258-2.531-9.492.703l-3.328 3.328c-3.305 3.282-3.586 6.774-.774 9.563c.774.797 1.64 1.312 2.274 1.43c.633-.446 1.383-1.266 1.71-2.016q-1.51-.246-2.32-1.055c-1.734-1.758-1.476-4.078.82-6.328l3.212-3.234c2.18-2.18 4.5-2.438 6.234-.703c1.758 1.734 1.547 4.054-.68 6.234l-2.32 2.297c.352.844.375 2.133.023 3.234l3.985-3.937c3.21-3.258 3.469-6.703.656-9.516m-21 21.047c2.79 2.766 6.258 2.531 9.492-.703l3.328-3.328c3.305-3.282 3.586-6.774.774-9.563c-.774-.797-1.64-1.312-2.274-1.43c-.633.446-1.383 1.266-1.71 2.016q1.51.246 2.32 1.055c1.734 1.758 1.476 4.055-.82 6.305l-3.211 3.257c-2.18 2.18-4.5 2.438-6.235.703c-1.758-1.734-1.547-4.054.68-6.234l2.32-2.297c-.352-.867-.375-2.133-.023-3.234l-3.985 3.937c-3.21 3.258-3.469 6.703-.656 9.516"></path></svg>
        <a th:href="@{/}" id="link-garden">HyperLink</a>
    </div>
    <div class="nav-center">
        <a th:href="@{/}">Templates</a>
    </div>
    <div th:if="!${signedIn}">
        <label th:value="${signedIn}"></label>
        <div class="nav-right">
            <a th:href="@{/login}">Sign In</a>
            <a th:href="@{/register}" id="sign-up-btn">Sign Up</a>
        </div>
    </div>
    <div th:if="${signedIn}">
        <div th:if="${usersProfile}" class="nav-right">
            <a th:href="@{/dashboard}">Dashboard</a>
            <form th:action="@{/logout}" method="post">
                <button type="submit">Logout</button>
            </form>
        </div>
        <div th:if="!${usersProfile}" class="nav-right">
            <form th:action="@{/profile/find}" method="post">
                <label hidden="hidden">
                    <input type="text" autocomplete="off" name="userName" th:value="${principalName}" hidden>
                </label>
                <button class="" type="submit">Profile Page</button>
            </form>
            <a th:href="@{/dashboard}">Dashboard</a>
            <form th:action="@{/logout}" method="post">
                <button type="submit">Logout</button>
            </form>
        </div>
    </div>
</nav>
<div class="profile-container">
    <!-- Set background image if user has selected one -->
    <div th:with="bgUrl=${user.backgroundImage != null and !user.backgroundImage.isEmpty() ?
                        (#strings.startsWith(user.backgroundImage, '/images/') ?
                         user.backgroundImage :
                         '/images/background-templates/' + user.backgroundImage) : null}"
         class="profile-container"
         th:classappend="${' link-style-' + (user.linkStyle != null ? user.linkStyle : 'pill') + ' text-align-' + (user.textAlign != null ? user.textAlign : 'center') + ' button-color-' + (user.buttonColor != null ? user.buttonColor : 'blue') + ' font-family-' + (user.fontFamily != null ? user.fontFamily.toLowerCase() : 'system')}"
         th:style="${bgUrl != null} ? 'background: url(' + ${bgUrl} + ') center/cover no-repeat fixed; min-height: 100vh;' : ''"
    >
        <img class="profile-pic" th:src="${user.profilePicture}" alt="Profile Picture">

        <h1 class="name" th:text="${user.name}">Default Name</h1>

        <p class="demographics">
            <span th:text="${user.age}">Age</span> • <span th:text="${user.pronouns}">Pronouns</span>
        </p>

        <p class="bio" th:text="${user.bio}">Default bio text goes here.</p>

        <ul class="link-list">
            <li th:each="link : ${user.socialLinks}">
                <a class="link-button" th:href="${link.url}" target="_blank" th:text="${link.title}">Link Title</a>
            </li>
        </ul>
    </div>
</div>
</body>
</html>
